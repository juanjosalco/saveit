name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

# OIDC federated login to Azure — no client secrets stored.
permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install backend
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e .[azure]
          pip install pytest
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    # Add `environment: production` later if/when you want manual approval
    # gates. Doing so requires a matching federated credential subject of
    # `repo:<owner>/<repo>:environment:production` on the Entra app.
    env:
      AZURE_RG:   ${{ vars.AZURE_RG }}
      ACR_NAME:   ${{ vars.ACR_NAME }}
      ACA_NAME:   ${{ vars.ACA_NAME }}
      IMAGE_NAME: saveit
    steps:
      - uses: actions/checkout@v4

      - name: Validate required config
        run: |
          missing=0
          for v in AZURE_RG ACR_NAME ACA_NAME; do
            if [ -z "${!v}" ]; then echo "::error::Missing repo variable: $v"; missing=1; fi
          done
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then echo "::error::Missing secret: AZURE_CLIENT_ID"; missing=1; fi
          if [ -z "${{ secrets.AZURE_TENANT_ID }}" ]; then echo "::error::Missing secret: AZURE_TENANT_ID"; missing=1; fi
          if [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then echo "::error::Missing secret: AZURE_SUBSCRIPTION_ID"; missing=1; fi
          [ "$missing" = "0" ]

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image (linux/amd64)
        run: |
          IMAGE="$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"
          LATEST="$ACR_NAME.azurecr.io/$IMAGE_NAME:latest"
          docker buildx build --platform linux/amd64 -t "$IMAGE" -t "$LATEST" --push .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update Container App
        run: |
          az containerapp update \
            --name "$ACA_NAME" \
            --resource-group "$AZURE_RG" \
            --image "$IMAGE"

      - name: Show app URL
        run: |
          FQDN=$(az containerapp show -n "$ACA_NAME" -g "$AZURE_RG" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed: https://$FQDN"

