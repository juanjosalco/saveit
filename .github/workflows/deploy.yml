name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

# OIDC federated login to Azure — no client secrets stored.
permissions:
  id-token: write
  contents: read

env:
  AZURE_RG:        ${{ vars.AZURE_RG }}        # e.g. saveit-rg
  ACR_NAME:        ${{ vars.ACR_NAME }}        # e.g. saveitacrxxxxx
  ACA_NAME:        ${{ vars.ACA_NAME }}        # e.g. saveit
  IMAGE_NAME:      saveit
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install backend
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e .[azure]
          pip install pytest
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ env.AZURE_CLIENT_ID }}
          tenant-id:       ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Build and push image
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest" .
          docker push "$IMAGE"
          docker push "${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update Container App
        run: |
          az containerapp update \
            --name "${{ env.ACA_NAME }}" \
            --resource-group "${{ env.AZURE_RG }}" \
            --image "${{ env.IMAGE }}"

      - name: Show app URL
        run: |
          FQDN=$(az containerapp show -n "${{ env.ACA_NAME }}" -g "${{ env.AZURE_RG }}" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed: https://$FQDN"
